# NAVIG Host Configuration - Local Development
# File: ~/.navig/hosts/local.yaml

# Host connection details
name: local
host: localhost
port: 22
user: developer
ssh_key: ~/.ssh/id_rsa

# Default app when not specified
default_app: myapp-local

# Database root credentials (for host-level database management)
database:
  root_user: root
  root_password: ""  # Empty for local development

# Host metadata
metadata:
  description: "Local development environment"
  os: "Ubuntu 22.04"
  type: "local"
  created_at: "2024-01-15T10:00:00Z"

# Note: App configurations have been moved to individual files in examples/apps/
# Available apps on this host:
#   - myapp-local (examples/apps/myapp-local.yaml)
#   - portfolio-local (examples/apps/portfolio-local.yaml)
