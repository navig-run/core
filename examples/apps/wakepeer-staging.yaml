# NAVIG App Configuration - myapp Staging
# File: ~/.navig/apps/myapp-staging.yaml

# App identification (REQUIRED)
name: myapp-staging
host: myhost

# App metadata
metadata:
  description: "myapp staging environment"
  type: "laravel"
  environment: "staging"
  version: "1.1.0-beta"
  repository: "https://github.com/user/myapp"
  domain: "staging.myapp.com"

# App paths
paths:
  web_root: /var/www/myapp-staging/public
  logs: /var/log/myapp-staging

# Database configuration
database:
  type: mysql
  host: localhost
  port: 3306
  name: myapp_staging
  user: myapp_staging_user
  password: "ENCRYPTED_PASSWORD_HERE"
  remote_port: 3306
  local_tunnel_port: 3308

# Services
services:
  web: apache2
  php: php8.2-fpm
  database: mysql

# Webserver configuration (REQUIRED)
webserver:
  type: apache2
  service_name: apache2
  config_test_command: "apache2ctl configtest"
  reload_command: "systemctl reload apache2"
  restart_command: "systemctl restart apache2"

