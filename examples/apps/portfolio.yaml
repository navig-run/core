# NAVIG App Configuration - Portfolio Production
# File: ~/.navig/apps/portfolio.yaml

# App identification (REQUIRED)
name: portfolio
host: example-vps

# App metadata
metadata:
  description: "Portfolio website production"
  type: "react"
  environment: "production"
  version: "2.1.0"
  repository: "https://github.com/user/portfolio"
  domain: "portfolio.example.com"

# App paths
paths:
  web_root: /var/www/portfolio/build
  logs: /var/log/portfolio
  nginx_config: /etc/nginx/sites-available/portfolio.conf

# Services
services:
  web: nginx

# Webserver configuration (REQUIRED)
webserver:
  type: nginx
  service_name: nginx
  config_test_command: "nginx -t"
  reload_command: "systemctl reload nginx"
  restart_command: "systemctl restart nginx"

