# NAVIG App Configuration - Portfolio Local Development
# File: ~/.navig/apps/portfolio-local.yaml

# App identification (REQUIRED)
name: portfolio-local
host: local

# App metadata
metadata:
  description: "Portfolio website local development"
  type: "react"
  environment: "development"
  domain: "localhost:3000"

# App paths
paths:
  web_root: /home/developer/apps/portfolio/build
  logs: /home/developer/apps/portfolio/logs

# Services
services:
  web: nginx

# Webserver configuration (REQUIRED)
webserver:
  type: nginx
  service_name: nginx
  config_test_command: "nginx -t"
  reload_command: "systemctl reload nginx"
  restart_command: "systemctl restart nginx"

