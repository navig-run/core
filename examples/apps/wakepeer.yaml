# NAVIG App Configuration - myapp Production
# File: ~/.navig/apps/myapp.yaml

# App identification (REQUIRED)
name: myapp
host: myhost

# App metadata
metadata:
  description: "myapp production"
  type: "laravel"
  environment: "production"
  version: "1.0.0"
  repository: "https://github.com/user/myapp"
  domain: "myapp.com"

# App paths
paths:
  web_root: /var/www/myapp/public
  logs: /var/log/myapp
  php_config: /etc/php/8.2/fpm/pool.d/myapp.conf

# Database configuration
database:
  type: mysql
  host: localhost
  port: 3306
  name: myapp_prod
  user: myapp_user
  password: "ENCRYPTED_PASSWORD_HERE"
  remote_port: 3306
  local_tunnel_port: 3307

# Services
services:
  web: apache2
  php: php8.2-fpm
  database: mysql
  cache: redis-server
  queue: supervisor

# Webserver configuration (REQUIRED)
webserver:
  type: apache2
  service_name: apache2
  config_test_command: "apache2ctl configtest"
  reload_command: "systemctl reload apache2"
  restart_command: "systemctl restart apache2"

