# NAVIG App Configuration - myapp Development
# File: ~/.navig/apps/myapp-dev.yaml

# App identification (REQUIRED)
name: myapp-dev
host: myhost

# App metadata
metadata:
  description: "myapp development environment"
  type: "laravel"
  environment: "development"
  version: "1.2.0-dev"
  repository: "https://github.com/user/myapp"
  domain: "dev.myapp.com"

# App paths
paths:
  web_root: /var/www/myapp-dev/public
  logs: /var/log/myapp-dev

# Database configuration
database:
  type: mysql
  host: localhost
  port: 3306
  name: myapp_dev
  user: myapp_dev_user
  password: "ENCRYPTED_PASSWORD_HERE"
  remote_port: 3306
  local_tunnel_port: 3309

# Services
services:
  web: apache2
  php: php8.2-fpm
  database: mysql

# Webserver configuration (REQUIRED)
webserver:
  type: apache2
  service_name: apache2
  config_test_command: "apache2ctl configtest"
  reload_command: "systemctl reload apache2"
  restart_command: "systemctl restart apache2"

