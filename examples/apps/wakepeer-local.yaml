# NAVIG App Configuration - myapp Local Development
# File: ~/.navig/apps/myapp-local.yaml

# App identification (REQUIRED)
name: myapp-local
host: local

# App metadata
metadata:
  description: "myapp local development"
  type: "laravel"
  environment: "development"
  domain: "localhost:8000"
  repository: "https://github.com/user/myapp"

# App paths
paths:
  web_root: /home/developer/apps/myapp/public
  logs: /home/developer/apps/myapp/storage/logs
  nginx_config: /etc/nginx/sites-available/myapp-local

# Database configuration
database:
  type: mysql
  host: localhost
  port: 3306
  name: myapp_local
  user: root
  password: ""
  local_tunnel_port: 3307

# Services
services:
  web: nginx
  php: php8.2-fpm
  database: mysql

# Webserver configuration (REQUIRED)
webserver:
  type: nginx
  service_name: nginx
  config_test_command: "nginx -t"
  reload_command: "systemctl reload nginx"
  restart_command: "systemctl restart nginx"

