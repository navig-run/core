# NAVIG Hello Plugin Metadata
# This file provides additional metadata about the plugin

name: hello
version: 1.0.0
description: Example plugin - demonstrates NAVIG plugin development
author: NAVIG Team
homepage: https://github.com/navig-run/remote-manager

# Plugin dependencies (Python packages)
# These will be checked before loading the plugin
dependencies: []

# Required permissions
# - ssh: Execute commands on remote hosts
# - config_read: Read NAVIG configuration
# - config_write: Modify NAVIG configuration
# - file_system: Access local file system
# - network: Make network requests
permissions:
  - config_read
  - config_write
  - ssh

# Plugin commands (for documentation)
commands:
  - name: greet
    description: Say hello to someone
  - name: info
    description: Show plugin information and NAVIG context
  - name: remote-test
    description: Run a command on the active remote host
  - name: config-demo
    description: Demonstrate plugin configuration
