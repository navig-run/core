site: example.org
match: example.org
description: "Example app flow used by cortex browser tests"
priority: 50

flows:
  login:
    description: "Navigate and log in to the example app"
    variables: [email, password]
    steps:
      - action: navigate
        input: "https://example.org/account/login"
        wait_after: navigate

      - action: fill_fast
        selector: { kind: css, value: "input[type='email'], input[name='email']" }
        input: "{{email}}"
        wait_after: none

      - action: fill_fast
        selector: { kind: css, value: "input[type='password']" }
        input: "{{password}}"
        wait_after: none

      - action: click
        selector: { kind: role, value: "button[name*='Log in']" }
        fallbacks:
          - { kind: role, value: "button[name*='Sign in']" }
          - { kind: css, value: "button[type='submit']" }
        wait_after: navigate

  post:
    description: "Create a post in the example app"
    variables: [text]
    steps:
      - action: fill_fast
        selector: { kind: css, value: "textarea, [contenteditable='true']" }
        input: "{{text}}"
        wait_after: none

      - action: click
        selector: { kind: role, value: "button[name*='Post']" }
        fallbacks:
          - { kind: role, value: "button[name*='Submit']" }
          - { kind: css, value: "form button[type='submit']" }
        wait_after: stable