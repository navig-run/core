
name: test_advanced
description: "Test advanced implementation features: conditionals, capture, snap."
steps:
  - action: run_command
    args:
      command: "start notepad"
  
  - action: wait_for
    args:
      type: "window"
      target: "Notepad"
      timeout: 5.0
  
  - action: snap_window
    args:
      selector: "Notepad"
      position: "right"
  
  - action: get_focused_window
    capture: focused_win
  
  - action: type
    if: "'Notepad' in '{{focused_win}}'"
    args:
      text: "Attributes captured. Conditional check passed. Automation is robust."
  
  - action: wait
    args:
      seconds: 2.0
  
  - action: maximize_window
    args:
      selector: "Notepad"
