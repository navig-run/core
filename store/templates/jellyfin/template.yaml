# Jellyfin Addon Template for NAVIG
# Free Software Media System

name: jellyfin
version: "1.0.0"
description: "Free Software Media System - stream movies, TV shows, music, and more"
author: navig-run
enabled: false
dependencies: []

paths:
  install_dir: /usr/share/jellyfin
  config_dir: /etc/jellyfin
  data_dir: /var/lib/jellyfin
  cache_dir: /var/cache/jellyfin
  log_dir: /var/log/jellyfin
  media_dir: /srv/media
  transcoding_dir: /var/lib/jellyfin/transcodes

services:
  jellyfin: jellyfin

commands:
  - name: status
    description: "Check Jellyfin service status"
    command: "systemctl status jellyfin"
  - name: restart
    description: "Restart Jellyfin service"
    command: "systemctl restart jellyfin"
  - name: logs
    description: "View Jellyfin logs"
    command: "journalctl -u jellyfin -f"
  - name: scan_library
    description: "Trigger library scan"
    command: "curl -X POST 'http://localhost:8096/Library/Refresh' -H 'X-Emby-Token: $API_KEY'"
  - name: clear_cache
    description: "Clear image cache"
    command: "rm -rf /var/cache/jellyfin/images/*"
  - name: update
    description: "Update Jellyfin to latest version"
    command: "apt update && apt upgrade -y jellyfin jellyfin-server jellyfin-web"
  - name: backup_config
    description: "Backup Jellyfin configuration"
    command: "tar -czf /var/backups/jellyfin_config_$(date +%Y%m%d).tar.gz /etc/jellyfin /var/lib/jellyfin/data"
  - name: hardware_info
    description: "Show hardware transcoding capabilities"
    command: "jellyfin-ffmpeg -hwaccels"

env_vars:
  JELLYFIN_CONFIG_DIR: /etc/jellyfin
  JELLYFIN_DATA_DIR: /var/lib/jellyfin
  JELLYFIN_CACHE_DIR: /var/cache/jellyfin
  JELLYFIN_LOG_DIR: /var/log/jellyfin
  JELLYFIN_FFMPEG: /usr/lib/jellyfin-ffmpeg/ffmpeg

api:
  endpoint: "http://localhost:8096"
  auth_method: api_key
  doc_url: "https://api.jellyfin.org/"

default_port: 8096
alt_ports:
  - 8920

systemd_service: jellyfin

hardware_acceleration:
  - vaapi
  - nvenc
  - qsv
  - v4l2m2m
