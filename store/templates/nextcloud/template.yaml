# Nextcloud Template Configuration
# Self-hosted productivity platform

name: nextcloud
version: 1.0.0
description: Self-hosted productivity platform for file sync, collaboration, and communication
author: navig-run
enabled: false
dependencies:
  - docker

paths:
  data_dir: /opt/nextcloud/data
  config_dir: /opt/nextcloud/config
  apps_dir: /opt/nextcloud/apps
  compose_file: /opt/nextcloud/docker-compose.yml
  nginx_conf: /opt/nextcloud/nginx.conf
  php_conf: /opt/nextcloud/php.conf
  db_data: /opt/nextcloud/db

services:
  nextcloud: nextcloud
  nextcloud_container: nextcloud-app
  database: nextcloud-db
  redis: nextcloud-redis

commands:
  - name: start
    description: Start Nextcloud stack
    command: cd /opt/nextcloud && docker compose up -d

  - name: stop
    description: Stop Nextcloud stack
    command: cd /opt/nextcloud && docker compose down

  - name: restart
    description: Restart Nextcloud stack
    command: cd /opt/nextcloud && docker compose restart

  - name: status
    description: Check Nextcloud container status
    command: docker ps -f name=nextcloud

  - name: logs
    description: View Nextcloud logs
    command: docker logs -f nextcloud-app

  - name: occ
    description: Run Nextcloud occ command
    command: docker exec -u www-data nextcloud-app php occ

  - name: scan_files
    description: Scan files for changes
    command: docker exec -u www-data nextcloud-app php occ files:scan --all

  - name: maintenance_on
    description: Enable maintenance mode
    command: docker exec -u www-data nextcloud-app php occ maintenance:mode --on

  - name: maintenance_off
    description: Disable maintenance mode
    command: docker exec -u www-data nextcloud-app php occ maintenance:mode --off

  - name: update
    description: Update Nextcloud to latest version
    command: cd /opt/nextcloud && docker compose pull && docker compose up -d

  - name: cron
    description: Run Nextcloud cron jobs
    command: docker exec -u www-data nextcloud-app php cron.php

  - name: backup
    description: Backup Nextcloud data
    command: docker exec -u www-data nextcloud-app php occ maintenance:mode --on && tar -czvf /backup/nextcloud-$(date +%Y%m%d).tar.gz /opt/nextcloud && docker exec -u www-data nextcloud-app php occ maintenance:mode --off

env_vars:
  NEXTCLOUD_ADMIN_USER: admin
  NEXTCLOUD_ADMIN_PASSWORD: ""
  MYSQL_DATABASE: nextcloud
  MYSQL_USER: nextcloud
  MYSQL_PASSWORD: ""
  MYSQL_ROOT_PASSWORD: ""
  NEXTCLOUD_TRUSTED_DOMAINS: localhost

api:
  endpoint: /ocs/v2.php
  auth_method: basic
  doc_url: https://docs.nextcloud.com/server/latest/developer_manual/client_apis/

default_port: 8080
systemd_service: null

database:
  type: mysql
  name: nextcloud
  user: nextcloud
