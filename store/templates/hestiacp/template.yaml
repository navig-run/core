# HestiaCP Template Configuration
# Web hosting control panel integration with default paths and API endpoints

name: hestiacp
version: 1.0.0
description: HestiaCP web hosting control panel integration with default paths and API endpoints
author: navig-run
enabled: false
dependencies: []

paths:
  hestia_root: /usr/local/hestia
  hestia_bin: /usr/local/hestia/bin
  hestia_conf: /usr/local/hestia/conf
  hestia_data: /usr/local/hestia/data
  web_root: /home/admin/web
  user_data: /home/admin
  backup_dir: /backup
  log_dir: /var/log/hestia

services:
  control_panel: hestia
  web: nginx
  php: php-fpm
  database: mysql
  mail: exim4
  dns: bind9
  ftp: vsftpd

commands:
  - name: list_users
    description: List all HestiaCP users
    command: v-list-users

  - name: list_domains
    description: List all domains for a user
    command: v-list-web-domains USER

  - name: list_databases
    description: List all databases for a user
    command: v-list-databases USER

  - name: backup_user
    description: Backup a user account
    command: v-backup-user USER

  - name: restart_services
    description: Restart web services
    command: v-restart-web && v-restart-proxy

env_vars:
  HESTIA_INSTALL_DIR: /usr/local/hestia
  HESTIA_API_ENABLED: "true"

api:
  endpoint: https://server-hostname:8083/api/
  auth_method: api_key
  doc_url: https://hestiacp.com/docs/server-administration/rest-api.html
