# Nginx Template Configuration
# High-performance web server, reverse proxy, and load balancer

name: nginx
version: 1.0.0
description: High-performance web server, reverse proxy, and load balancer with SSL/TLS support
author: navig-run
enabled: false
dependencies: []

paths:
  config_dir: /etc/nginx
  main_config: /etc/nginx/nginx.conf
  sites_available: /etc/nginx/sites-available
  sites_enabled: /etc/nginx/sites-enabled
  conf_d: /etc/nginx/conf.d
  snippets: /etc/nginx/snippets
  html_root: /var/www/html
  log_dir: /var/log/nginx
  access_log: /var/log/nginx/access.log
  error_log: /var/log/nginx/error.log
  ssl_dir: /etc/nginx/ssl
  cache_dir: /var/cache/nginx

services:
  web_server: nginx
  nginx_service: nginx.service

commands:
  - name: start
    description: Start Nginx service
    command: systemctl start nginx

  - name: stop
    description: Stop Nginx service
    command: systemctl stop nginx

  - name: restart
    description: Restart Nginx service
    command: systemctl restart nginx

  - name: reload
    description: Reload Nginx configuration without downtime
    command: systemctl reload nginx

  - name: status
    description: Check Nginx service status
    command: systemctl status nginx

  - name: test_config
    description: Test Nginx configuration for syntax errors
    command: nginx -t

  - name: logs_access
    description: View access logs in real-time
    command: tail -f /var/log/nginx/access.log

  - name: logs_error
    description: View error logs in real-time
    command: tail -f /var/log/nginx/error.log

  - name: list_sites
    description: List enabled sites
    command: ls -la /etc/nginx/sites-enabled/

  - name: version
    description: Show Nginx version and build info
    command: nginx -V

env_vars:
  NGINX_WORKER_PROCESSES: auto
  NGINX_WORKER_CONNECTIONS: "1024"

api:
  endpoint: null
  auth_method: null
  doc_url: https://nginx.org/en/docs/

default_port: 80
ssl_port: 443
systemd_service: /lib/systemd/system/nginx.service
