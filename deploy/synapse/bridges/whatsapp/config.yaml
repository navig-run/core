# mautrix-whatsapp bridge config template
# Generated by install_vps_synapse_bridges.sh — edit as needed.
# Full docs: https://docs.mau.fi/bridges/go/whatsapp/index.html

homeserver:
  address: https://PLACEHOLDER_DOMAIN
  domain: PLACEHOLDER_DOMAIN

appservice:
  address: http://bridge-whatsapp:29318
  hostname: 0.0.0.0
  port: 29318
  database:
    type: sqlite3
    uri: file:/data/mautrix-whatsapp.db
  id: whatsapp
  bot_username: whatsappbot
  bot_displayname: WhatsApp Bridge
  bot_avatar: mxc://maunium.net/NeXNQarUbrlYBiPCpprYsRqS

bridge:
  username_template: "whatsapp_{{.}}"
  displayname_template: "{{if .PushName}}{{.PushName}}{{else}}{{.JID}}{{end}} (WhatsApp)"
  personal_filtering_spaces: true

  # Your Matrix user ID
  user_id: "@PLACEHOLDER_MATRIX_USER:PLACEHOLDER_DOMAIN"
  permissions:
    "@PLACEHOLDER_MATRIX_USER:PLACEHOLDER_DOMAIN": admin

  # Relay mode off — direct 1:1 bridging
  relay:
    enabled: false

  # History sync from phone on first login
  history_sync:
    request_full_sync: true
    full_sync_wait_time: 1m
    max_age: 720h  # 30 days

  # Media handling
  media_patterns: {}

  # Notifications
  send_presence_on_typing: false
  mute_bridging_notices: false

  # Message batching for initial sync
  initial_chat_sync: 100

logging:
  min_level: info
  writers:
    - type: stdout
      format: pretty-colored
