# mautrix-telegram bridge config template
# Generated by install_vps_synapse_bridges.sh — edit as needed.
# Full docs: https://docs.mau.fi/bridges/python/telegram/index.html

homeserver:
  # Must match your Synapse server_name (DOMAIN)
  address: https://PLACEHOLDER_DOMAIN
  domain: PLACEHOLDER_DOMAIN

appservice:
  address: http://bridge-telegram:29317
  hostname: 0.0.0.0
  port: 29317
  database: sqlite:////data/mautrix-telegram.db
  id: telegram
  bot_username: telegrambot
  bot_displayname: Telegram Bridge
  bot_avatar: mxc://maunium.net/tJCRmUyPEntzMDMNnqbMzNbo

bridge:
  # Your Matrix user ID — set to @you:PLACEHOLDER_DOMAIN
  user_id: "@PLACEHOLDER_MATRIX_USER:PLACEHOLDER_DOMAIN"
  # Permissions: your Matrix user gets full admin
  permissions:
    "@PLACEHOLDER_MATRIX_USER:PLACEHOLDER_DOMAIN": admin

  # Auto-create rooms for each Telegram chat
  create_group_on_invite: true
  sync_direct_chats: true
  sync_channel_members: false

  # Relay mode — bridge acts as relay for all chats
  relay_mode: false

  # Message formatting
  telegram_link_preview: true
  plaintext_highlights: false

  # Displayname template for Telegram users appearing in Matrix
  displayname_template: "{displayname} (Telegram)"

telegram:
  # Get from https://my.telegram.org/apps
  api_id: PLACEHOLDER_TG_API_ID
  api_hash: PLACEHOLDER_TG_API_HASH

  # Device info shown in your Telegram active sessions list
  device_info:
    device_model: "NAVIG Bridge"
    system_version: "Linux"
    app_version: "1.0"

logging:
  version: 1
  formatters:
    precise:
      format: "[%(levelname)s@%(name)s] %(message)s"
  handlers:
    console:
      class: logging.StreamHandler
      formatter: precise
  loggers:
    mau.crypto:
      level: DEBUG
  root:
    level: INFO
    handlers: [console]
