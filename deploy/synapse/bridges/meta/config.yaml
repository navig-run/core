# mautrix-meta bridge config template (Facebook Messenger + Instagram DMs)
# Generated by install_vps_synapse_bridges.sh — edit as needed.
# Full docs: https://docs.mau.fi/bridges/go/meta/index.html
#
# NOTE: This uses your PERSONAL Facebook/Instagram account login (cookies),
# not an App ID/Secret. This is what gives access to personal DMs.

homeserver:
  address: https://PLACEHOLDER_DOMAIN
  domain: PLACEHOLDER_DOMAIN

appservice:
  address: http://bridge-meta:29319
  hostname: 0.0.0.0
  port: 29319
  database:
    type: sqlite3
    uri: file:/data/mautrix-meta.db
  id: meta
  bot_username: metabot
  bot_displayname: Meta Bridge
  bot_avatar: mxc://maunium.net/NeXNQarUbrlYBiPCpprYsRqS

bridge:
  username_template: "meta_{{.}}"
  displayname_template: "{{.DisplayName}} ({{.Platform}})"

  # Your Matrix user ID
  user_id: "@PLACEHOLDER_MATRIX_USER:PLACEHOLDER_DOMAIN"
  permissions:
    "@PLACEHOLDER_MATRIX_USER:PLACEHOLDER_DOMAIN": admin

  # Which platforms to bridge (can enable both simultaneously)
  mode: facebook  # options: facebook, instagram, messenger
  # To bridge both Facebook and Instagram, run two separate meta bridge
  # containers with different ports — see docker-compose.bridges.yml

  # Media
  caption_in_message: false
  federate_rooms: false

  # History
  initial_conversation_sync_count: 50

logging:
  min_level: info
  writers:
    - type: stdout
      format: pretty-colored
