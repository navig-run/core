# NAVIG — Synapse + mautrix bridges (production, Postgres, nginx TLS)
# Usage: docker compose --env-file .env up -d
#
# Required .env keys (generated by install_vps_synapse_bridges.sh):
#   DOMAIN                            e.g. yourdomain.com
#   SYNAPSE_PORT                      internal port (default 8008)
#   SYNAPSE_SERVER_NAME               same as DOMAIN
#   SYNAPSE_REGISTRATION_SHARED_SECRET
#   POSTGRES_PASSWORD
#   LETSENCRYPT_EMAIL

name: navig-synapse

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: navig-synapse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--lc-collate=C --lc-ctype=C --encoding=UTF-8"
    volumes:
      - synapse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Synapse ─────────────────────────────────────────────────────────────────
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: navig-synapse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    ports:
      - "127.0.0.1:${SYNAPSE_PORT:-8008}:8008"
    volumes:
      - ./data:/data
      # Bridge registration files mounted as read-only app_service config
      - ./bridges/telegram/registration.yaml:/data/bridges/telegram.yaml:ro
      - ./bridges/whatsapp/registration.yaml:/data/bridges/whatsapp.yaml:ro
      - ./bridges/meta/registration.yaml:/data/bridges/meta.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8008/_matrix/client/versions || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── mautrix-telegram ────────────────────────────────────────────────────────
  # Bridges your personal Telegram account (not just the bot).
  # All contacts and chats become Matrix rooms.
  bridge-telegram:
    image: dock.mau.dev/mautrix/telegram:latest
    container_name: navig-bridge-telegram
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      - ./bridges/telegram:/data

  # ── mautrix-whatsapp ────────────────────────────────────────────────────────
  # Bridges WhatsApp via the multi-device API (QR scan once).
  bridge-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: navig-bridge-whatsapp
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      - ./bridges/whatsapp:/data

  # ── mautrix-meta (Facebook Messenger + Instagram DMs) ──────────────────────
  # Bridges Messenger and Instagram DMs via personal account login.
  bridge-meta:
    image: dock.mau.dev/mautrix/meta:latest
    container_name: navig-bridge-meta
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      - ./bridges/meta:/data

volumes:
  synapse-postgres:
