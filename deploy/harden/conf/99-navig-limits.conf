# NAVIG — File descriptor limits for navig user
# Deploy to: /etc/security/limits.d/99-navig.conf
#
# Required for: Docker containers, LLM inference (many open files),
#               agent subprocesses, and WebSocket connections
navig  soft  nofile  65535
navig  hard  nofile  65535
navig  soft  nproc   65535
navig  hard  nproc   65535
