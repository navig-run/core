# NAVIG — Journald retention configuration
# Deploy to: /etc/systemd/journald.conf.d/99-navig.conf
# Apply:     sudo systemctl restart systemd-journald
#
# Prevents log files from consuming excessive disk on a server
# that runs many containerized services with verbose output.
[Journal]
Storage=persistent
SystemMaxUse=500M
MaxRetentionSec=2week
Compress=yes
