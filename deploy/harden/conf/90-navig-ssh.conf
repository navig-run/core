# ─────────────────────────────────────────────────────────────
# NAVIG SSH Hardening — Drop-in configuration
# Deploy to: /etc/ssh/sshd_config.d/90-navig-hardening.conf
# Apply:     sudo sshd -t && sudo systemctl reload sshd
#
# WARNING: Ensure your SSH key is deployed BEFORE applying this.
#          Password auth will be DISABLED.
# ─────────────────────────────────────────────────────────────

# Disable root login — force all access through named user accounts
PermitRootLogin no

# Disable password auth — SSH keys only
PasswordAuthentication no

# Disable empty passwords (defense in depth)
PermitEmptyPasswords no

# Public key authentication
PubkeyAuthentication yes

# Limit authentication attempts (slow brute-force attacks)
MaxAuthTries 3

# 30-second window to complete login
LoginGraceTime 30

# Disable X11 forwarding — not needed on headless servers
X11Forwarding no

# Verbose logging for fail2ban and audit trail
LogLevel VERBOSE

# Disable keyboard-interactive auth (PAM challenge-response)
KbdInteractiveAuthentication no

# Restrict to specific users (uncomment and add as needed)
# AllowUsers navig
