<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- NAVIG Main Brand Icon - The Friendly Guardian Kraken -->
  <!-- Design Philosophy: Warm, intelligent, technical yet approachable -->
  
  <defs>
    <!-- Background gradient - deep tech with warmth -->
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0f1419"/>
    </linearGradient>
    
    <!-- Kraken body gradient - organic tech -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="40%" style="stop-color:#00a0c0"/>
      <stop offset="100%" style="stop-color:#007a90"/>
    </linearGradient>
    
    <!-- Tentacle gradients with organic feel -->
    <linearGradient id="tentCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="tentPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="tentGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.4"/>
    </linearGradient>
    
    <!-- Warm eye glow - friendly intelligence -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#00d4ff"/>
      <stop offset="70%" style="stop-color:#00a0c0"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Subtle inner glow for warmth -->
    <radialGradient id="warmGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Glow filters -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eyeGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="circuitGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgMain)"/>
  
  <!-- Warm inner glow -->
  <circle cx="256" cy="220" r="180" fill="url(#warmGlow)"/>
  
  <!-- Background circuit pattern (subtle tech layer) -->
  <g opacity="0.12" filter="url(#circuitGlow)">
    <!-- Horizontal data lines -->
    <line x1="50" y1="256" x2="100" y2="256" stroke="#00d4ff" stroke-width="2"/>
    <line x1="412" y1="256" x2="462" y2="256" stroke="#00d4ff" stroke-width="2"/>
    <!-- Vertical data lines -->
    <line x1="256" y1="50" x2="256" y2="100" stroke="#00d4ff" stroke-width="2"/>
    <line x1="256" y1="412" x2="256" y2="462" stroke="#00d4ff" stroke-width="2"/>
    <!-- Data nodes -->
    <circle cx="100" cy="256" r="4" fill="#00d4ff"/>
    <circle cx="412" cy="256" r="4" fill="#00d4ff"/>
    <circle cx="256" cy="100" r="4" fill="#00d4ff"/>
    <circle cx="256" cy="412" r="4" fill="#00d4ff"/>
    <!-- Corner connections -->
    <circle cx="100" cy="100" r="3" fill="#7b2fff"/>
    <circle cx="412" cy="100" r="3" fill="#7b2fff"/>
    <circle cx="100" cy="412" r="3" fill="#00ff88"/>
    <circle cx="412" cy="412" r="3" fill="#00ff88"/>
  </g>
  
  <!-- The Kraken - Body and Tentacles -->
  
  <!-- Tentacles (reaching into different domains) -->
  <g filter="url(#softGlow)">
    <!-- DevOps tentacles (left side - purple for infrastructure) -->
    <path d="M 140 280 Q 80 300, 55 350 Q 40 390, 60 420 Q 70 440, 90 435" 
          fill="none" stroke="url(#tentPurple)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 160 310 Q 100 350, 70 400 Q 50 450, 75 470" 
          fill="none" stroke="url(#tentPurple)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- LifeOps tentacles (right side - green for growth/life) -->
    <path d="M 372 280 Q 432 300, 457 350 Q 472 390, 452 420 Q 442 440, 422 435" 
          fill="none" stroke="url(#tentGreen)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 352 310 Q 412 350, 442 400 Q 462 450, 437 470" 
          fill="none" stroke="url(#tentGreen)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Central tentacles (cyan - primary operations) -->
    <path d="M 200 340 Q 180 400, 160 460" 
          fill="none" stroke="url(#tentCyan)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 256 350 Q 256 410, 256 470" 
          fill="none" stroke="url(#tentCyan)" stroke-width="11" stroke-linecap="round"/>
    <path d="M 312 340 Q 332 400, 352 460" 
          fill="none" stroke="url(#tentCyan)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Outer tentacles (reaching further) -->
    <path d="M 116 260 Q 60 270, 40 320 Q 25 360, 45 380" 
          fill="none" stroke="url(#tentCyan)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 396 260 Q 452 270, 472 320 Q 487 360, 467 380" 
          fill="none" stroke="url(#tentCyan)" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Kraken Head - Friendly, Intelligent -->
  <g filter="url(#softGlow)">
    <!-- Main dome - organic shape -->
    <ellipse cx="256" cy="200" rx="130" ry="100" fill="#0d1117" stroke="url(#bodyGrad)" stroke-width="5"/>
    
    <!-- Inner dome highlight -->
    <ellipse cx="256" cy="175" rx="90" ry="55" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.25"/>
    
    <!-- Lower face/mantle - friendly rounded shape -->
    <path d="M 126 220 Q 126 330, 256 360 Q 386 330, 386 220" 
          fill="#0d1117" stroke="url(#bodyGrad)" stroke-width="4"/>
  </g>
  
  <!-- Eyes - Warm, Intelligent, Friendly -->
  <g filter="url(#eyeGlowFilter)">
    <!-- Left eye socket - slightly larger for friendliness -->
    <ellipse cx="190" cy="200" rx="40" ry="44" fill="#0a0d12" stroke="#00d4ff" stroke-width="3"/>
    <!-- Left eye glow -->
    <ellipse cx="190" cy="200" rx="22" ry="26" fill="url(#eyeGlow)"/>
    <!-- Left eye sparkle (life) -->
    <ellipse cx="185" cy="192" rx="7" ry="9" fill="#ffffff"/>
    <circle cx="198" cy="205" r="3" fill="#ffffff" opacity="0.6"/>
    
    <!-- Right eye socket -->
    <ellipse cx="322" cy="200" rx="40" ry="44" fill="#0a0d12" stroke="#00d4ff" stroke-width="3"/>
    <!-- Right eye glow -->
    <ellipse cx="322" cy="200" rx="22" ry="26" fill="url(#eyeGlow)"/>
    <!-- Right eye sparkle (life) -->
    <ellipse cx="317" cy="192" rx="7" ry="9" fill="#ffffff"/>
    <circle cx="330" cy="205" r="3" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Forehead "Brain" - Circuit Pattern (Intelligence) -->
  <g filter="url(#circuitGlow)" opacity="0.85">
    <!-- Central processing node -->
    <circle cx="256" cy="130" r="8" fill="#00ff88"/>
    
    <!-- Neural connections -->
    <line x1="256" y1="138" x2="256" y2="160" stroke="#00ff88" stroke-width="3"/>
    <line x1="240" y1="145" x2="272" y2="145" stroke="#00ff88" stroke-width="2"/>
    
    <!-- Side branches -->
    <path d="M 230 128 L 205 118 L 190 128" fill="none" stroke="#7b2fff" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 282 128 L 307 118 L 322 128" fill="none" stroke="#7b2fff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="190" cy="128" r="4" fill="#7b2fff"/>
    <circle cx="322" cy="128" r="4" fill="#7b2fff"/>
    
    <!-- Upper connections -->
    <path d="M 256 122 L 256 110 L 235 95" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M 256 110 L 277 95" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="235" cy="95" r="3" fill="#00d4ff"/>
    <circle cx="277" cy="95" r="3" fill="#00d4ff"/>
  </g>
  
  <!-- Gentle smile curve (friendly expression) -->
  <path d="M 215 260 Q 256 285, 297 260" 
        fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  
  <!-- "N" watermark (subtle branding) -->
  <text x="470" y="490" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d4ff" opacity="0.2">N</text>
</svg>
