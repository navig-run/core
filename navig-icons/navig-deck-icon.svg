<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- NAVIG Deck Icon - Chrome Extension (optimized for small sizes) -->
  <!-- Design: Compact kraken face, simplified for browser toolbar -->
  
  <defs>
    <linearGradient id="deckBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    
    <linearGradient id="deckAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00a0c0"/>
    </linearGradient>
    
    <radialGradient id="deckEyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    
    <filter id="deckGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#deckBg)"/>
  
  <!-- Subtle border -->
  <rect x="2" y="2" width="124" height="124" rx="22" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Simplified Kraken Head (larger for visibility) -->
  <g filter="url(#deckGlow)">
    <!-- Main head -->
    <ellipse cx="64" cy="48" rx="38" ry="30" fill="#0d1117" stroke="url(#deckAccent)" stroke-width="2.5"/>
    
    <!-- Lower face -->
    <path d="M 26 55 Q 26 85, 64 95 Q 102 85, 102 55" 
          fill="#0d1117" stroke="url(#deckAccent)" stroke-width="2"/>
  </g>
  
  <!-- Eyes (extra large and friendly for small icon) -->
  <g filter="url(#deckGlow)">
    <!-- Left eye -->
    <ellipse cx="48" cy="48" rx="14" ry="16" fill="#0a0d12" stroke="#00d4ff" stroke-width="1.5"/>
    <ellipse cx="48" cy="48" rx="8" ry="10" fill="url(#deckEyeGlow)"/>
    <ellipse cx="46" cy="45" rx="3" ry="4" fill="#ffffff"/>
    
    <!-- Right eye -->
    <ellipse cx="80" cy="48" rx="14" ry="16" fill="#0a0d12" stroke="#00d4ff" stroke-width="1.5"/>
    <ellipse cx="80" cy="48" rx="8" ry="10" fill="url(#deckEyeGlow)"/>
    <ellipse cx="78" cy="45" rx="3" ry="4" fill="#ffffff"/>
  </g>
  
  <!-- Forehead node (simplified) -->
  <circle cx="64" cy="28" r="4" fill="#00ff88" filter="url(#deckGlow)"/>
  
  <!-- Simplified tentacles (3 main ones) -->
  <g filter="url(#deckGlow)">
    <path d="M 45 90 Q 35 105, 25 120" fill="none" stroke="#7b2fff" stroke-width="5" stroke-linecap="round"/>
    <path d="M 64 95 Q 64 110, 64 125" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"/>
    <path d="M 83 90 Q 93 105, 103 120" fill="none" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- "D" badge (Deck indicator) -->
  <circle cx="108" cy="20" r="14" fill="#7b2fff"/>
  <text x="108" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">D</text>
</svg>
