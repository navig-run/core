<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    NAVIG Deck - Browser Extension Icon
    Optimized for 16-48px display
  -->
  
  <defs>
    <radialGradient id="deckBg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#141b2d"/>
      <stop offset="100%" stop-color="#080c14"/>
    </radialGradient>
    
    <linearGradient id="deckEnergy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    
    <linearGradient id="deckLife" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="100%" stop-color="#00cc77"/>
    </linearGradient>
    
    <linearGradient id="deckWisdom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <radialGradient id="deckEye" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#006688" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="deckGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#deckBg)"/>
  
  <!-- Subtle border -->
  <rect x="2" y="2" width="124" height="124" rx="22" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  
  <!-- Kraken Head - Large for visibility -->
  <g filter="url(#deckGlow)">
    <ellipse cx="64" cy="48" rx="40" ry="32" fill="#0a0f18" stroke="url(#deckEnergy)" stroke-width="2.5"/>
    
    <path d="M 24 55 Q 24 88, 56 98 Q 64 102, 72 98 Q 104 88, 104 55"
          fill="#0a0f18" stroke="url(#deckEnergy)" stroke-width="2"/>
  </g>
  
  <!-- Large Eyes -->
  <g filter="url(#deckGlow)">
    <ellipse cx="48" cy="48" rx="14" ry="16" fill="#050810"/>
    <ellipse cx="48" cy="48" rx="14" ry="16" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <ellipse cx="48" cy="48" rx="9" ry="11" fill="url(#deckEye)"/>
    <ellipse cx="45" cy="44" rx="3" ry="4" fill="#ffffff"/>
    
    <ellipse cx="80" cy="48" rx="14" ry="16" fill="#050810"/>
    <ellipse cx="80" cy="48" rx="14" ry="16" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <ellipse cx="80" cy="48" rx="9" ry="11" fill="url(#deckEye)"/>
    <ellipse cx="77" cy="44" rx="3" ry="4" fill="#ffffff"/>
  </g>
  
  <!-- Neural node -->
  <circle cx="64" cy="26" r="4" fill="#00ffaa" filter="url(#deckGlow)"/>
  
  <!-- Simplified Tentacles - 3 main -->
  <g filter="url(#deckGlow)">
    <path d="M 42 92 C 32 105, 22 118, 18 128"
          fill="none" stroke="url(#deckWisdom)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 64 98 C 64 110, 64 122, 64 134"
          fill="none" stroke="url(#deckEnergy)" stroke-width="7" stroke-linecap="round"/>
    <path d="M 86 92 C 96 105, 106 118, 110 128"
          fill="none" stroke="url(#deckLife)" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- "D" Badge - Deck identifier -->
  <circle cx="106" cy="22" r="14" fill="#a855f7"/>
  <text x="106" y="28" font-family="SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">D</text>
</svg>
