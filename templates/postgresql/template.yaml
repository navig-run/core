# PostgreSQL Template Configuration
# Advanced open-source relational database system

name: postgresql
version: 1.0.0
description: Advanced open-source relational database with powerful features for data integrity and performance
author: navig-run
enabled: false
dependencies: []

paths:
  data_dir: /var/lib/postgresql/16/main
  config_dir: /etc/postgresql/16/main
  main_config: /etc/postgresql/16/main/postgresql.conf
  hba_config: /etc/postgresql/16/main/pg_hba.conf
  log_dir: /var/log/postgresql
  backup_dir: /var/backups/postgresql
  bin_dir: /usr/lib/postgresql/16/bin
  socket_dir: /var/run/postgresql

services:
  database: postgresql
  postgresql_service: postgresql.service

commands:
  - name: start
    description: Start PostgreSQL service
    command: systemctl start postgresql

  - name: stop
    description: Stop PostgreSQL service
    command: systemctl stop postgresql

  - name: restart
    description: Restart PostgreSQL service
    command: systemctl restart postgresql

  - name: reload
    description: Reload PostgreSQL configuration
    command: systemctl reload postgresql

  - name: status
    description: Check PostgreSQL service status
    command: systemctl status postgresql

  - name: logs
    description: View PostgreSQL logs
    command: tail -f /var/log/postgresql/postgresql-16-main.log

  - name: psql
    description: Connect to PostgreSQL shell
    command: sudo -u postgres psql

  - name: list_databases
    description: List all databases
    command: sudo -u postgres psql -c "\\l"

  - name: list_users
    description: List all database users/roles
    command: sudo -u postgres psql -c "\\du"

  - name: backup_all
    description: Backup all databases
    command: sudo -u postgres pg_dumpall > /var/backups/postgresql/all_databases_$(date +%Y%m%d_%H%M%S).sql

  - name: vacuum
    description: Run VACUUM on all databases
    command: sudo -u postgres vacuumdb --all --analyze

  - name: version
    description: Show PostgreSQL version
    command: psql --version

env_vars:
  PGDATA: /var/lib/postgresql/16/main
  PGPORT: "5432"
  PGUSER: postgres

api:
  endpoint: null
  auth_method: null
  doc_url: https://www.postgresql.org/docs/

default_port: 5432
systemd_service: /lib/systemd/system/postgresql.service

database:
  supported:
    - postgresql
  default_db_path: /var/lib/postgresql/16/main
