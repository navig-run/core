# Plausible Analytics Addon Template for NAVIG
# Privacy-friendly, lightweight web analytics

name: plausible
version: "1.0.0"
description: "Privacy-first, lightweight web analytics without cookies or GDPR consent"
author: navig-run
enabled: false
dependencies:
  - docker
  - postgresql

paths:
  install_dir: /opt/plausible
  config_file: /opt/plausible/plausible-conf.env
  compose_file: /opt/plausible/docker-compose.yml
  data_dir: /var/lib/plausible
  clickhouse_dir: /var/lib/clickhouse
  postgres_dir: /var/lib/postgresql/plausible

services:
  plausible: plausible
  clickhouse: clickhouse
  postgres: postgres

commands:
  - name: start
    description: "Start Plausible services"
    command: "cd /opt/plausible && docker compose up -d"
  - name: stop
    description: "Stop Plausible services"
    command: "cd /opt/plausible && docker compose down"
  - name: restart
    description: "Restart Plausible services"
    command: "cd /opt/plausible && docker compose restart"
  - name: logs
    description: "View Plausible logs"
    command: "cd /opt/plausible && docker compose logs -f plausible"
  - name: update
    description: "Update Plausible to latest version"
    command: "cd /opt/plausible && docker compose pull && docker compose up -d"
  - name: create_admin
    description: "Create admin user"
    command: "cd /opt/plausible && docker compose exec plausible /app/bin/plausible rpc 'Plausible.Auth.create_user/2' email password"
  - name: backup_db
    description: "Backup PostgreSQL database"
    command: "docker exec plausible_db pg_dump -U postgres plausible > /var/backups/plausible_$(date +%Y%m%d).sql"
  - name: status
    description: "Check service status"
    command: "cd /opt/plausible && docker compose ps"

env_vars:
  BASE_URL: "https://analytics.example.com"
  SECRET_KEY_BASE: ""
  DISABLE_REGISTRATION: "invite_only"
  DATABASE_URL: "postgres://postgres:postgres@plausible_db:5432/plausible"
  CLICKHOUSE_DATABASE_URL: "http://plausible_events_db:8123/plausible_events_db"
  MAILER_EMAIL: "analytics@example.com"
  SMTP_HOST_ADDR: "localhost"
  SMTP_HOST_PORT: "25"

api:
  endpoint: "http://localhost:8000/api/v1"
  auth_method: bearer_token
  doc_url: "https://plausible.io/docs/stats-api"

default_port: 8000

database:
  supported:
    - postgresql
    - clickhouse
  default_type: postgresql
  default_name: plausible
