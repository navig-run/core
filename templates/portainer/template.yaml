# Portainer Template Configuration
# Docker container management UI

name: portainer
version: 1.0.0
description: Lightweight container management UI for Docker, Kubernetes, and Nomad
author: navig-run
enabled: false
dependencies:
  - docker

paths:
  data_dir: /opt/portainer/data
  docker_socket: /var/run/docker.sock
  compose_file: /opt/portainer/docker-compose.yml
  ssl_dir: /opt/portainer/certs

services:
  portainer: portainer
  portainer_container: portainer

commands:
  - name: start
    description: Start Portainer container
    command: cd /opt/portainer && docker compose up -d

  - name: stop
    description: Stop Portainer container
    command: cd /opt/portainer && docker compose down

  - name: restart
    description: Restart Portainer container
    command: cd /opt/portainer && docker compose restart

  - name: status
    description: Check Portainer container status
    command: docker ps -f name=portainer

  - name: logs
    description: View Portainer logs
    command: docker logs -f portainer

  - name: update
    description: Update Portainer to latest version
    command: cd /opt/portainer && docker compose pull && docker compose up -d

  - name: backup
    description: Backup Portainer data
    command: tar -czvf /backup/portainer-$(date +%Y%m%d).tar.gz /opt/portainer/data

  - name: shell
    description: Access Portainer container shell
    command: docker exec -it portainer /bin/sh

env_vars:
  PORTAINER_PORT: "9443"
  PORTAINER_HTTP_PORT: "9000"
  PORTAINER_ADMIN_PASSWORD: ""

api:
  endpoint: https://localhost:9443/api
  auth_method: bearer
  doc_url: https://docs.portainer.io/api/access

default_port: 9443
http_port: 9000
agent_port: 8000
systemd_service: null
