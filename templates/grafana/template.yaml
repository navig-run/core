# Grafana Template Configuration
# Analytics and interactive visualization platform

name: grafana
version: 1.0.0
description: Open-source analytics and interactive visualization web application
author: navig-run
enabled: false
dependencies: []

paths:
  config_file: /etc/grafana/grafana.ini
  data_dir: /var/lib/grafana
  log_dir: /var/log/grafana
  plugins_dir: /var/lib/grafana/plugins
  provisioning_dir: /etc/grafana/provisioning
  dashboards_dir: /etc/grafana/provisioning/dashboards
  datasources_dir: /etc/grafana/provisioning/datasources
  home_dir: /usr/share/grafana

services:
  grafana: grafana-server
  grafana_service: grafana-server.service

commands:
  - name: start
    description: Start Grafana service
    command: systemctl start grafana-server

  - name: stop
    description: Stop Grafana service
    command: systemctl stop grafana-server

  - name: restart
    description: Restart Grafana service
    command: systemctl restart grafana-server

  - name: status
    description: Check Grafana service status
    command: systemctl status grafana-server

  - name: logs
    description: View Grafana logs
    command: tail -f /var/log/grafana/grafana.log

  - name: version
    description: Check Grafana version
    command: grafana-cli -v

  - name: plugins_list
    description: List installed plugins
    command: grafana-cli plugins ls

  - name: plugins_update
    description: Update all plugins
    command: grafana-cli plugins update-all

  - name: reset_admin
    description: Reset admin password
    command: grafana-cli admin reset-admin-password

env_vars:
  GF_SERVER_HTTP_PORT: "3000"
  GF_SERVER_ROOT_URL: "http://localhost:3000"
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: admin
  GF_INSTALL_PLUGINS: grafana-clock-panel

api:
  endpoint: http://localhost:3000/api
  auth_method: bearer
  doc_url: https://grafana.com/docs/grafana/latest/developers/http_api/

default_port: 3000
systemd_service: /lib/systemd/system/grafana-server.service
