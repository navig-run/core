# Duplicati Addon Template for NAVIG
# Free backup software with encryption and cloud storage support

name: duplicati
version: "1.0.0"
description: "Free backup software with AES-256 encryption and cloud storage support"
author: navig-run
enabled: false
dependencies: []

paths:
  install_dir: /opt/duplicati
  config_dir: /root/.config/Duplicati
  data_dir: /var/lib/duplicati
  database_dir: /root/.config/Duplicati
  log_file: /var/log/duplicati/duplicati.log

services:
  duplicati: duplicati

commands:
  - name: status
    description: "Check Duplicati service status"
    command: "systemctl status duplicati"
  - name: restart
    description: "Restart Duplicati service"
    command: "systemctl restart duplicati"
  - name: backup_now
    description: "Run a backup job immediately"
    command: "duplicati-cli backup"
  - name: list_backups
    description: "List all configured backups"
    command: "duplicati-cli list"
  - name: verify
    description: "Verify backup integrity"
    command: "duplicati-cli test"
  - name: restore
    description: "Restore files from backup"
    command: "duplicati-cli restore"
  - name: repair
    description: "Repair backup database"
    command: "duplicati-cli repair"
  - name: compact
    description: "Compact backup storage"
    command: "duplicati-cli compact"
  - name: logs
    description: "View Duplicati logs"
    command: "journalctl -u duplicati -f"

env_vars:
  DUPLICATI_HOME: /opt/duplicati
  MONO_EXTERNAL_ENCODINGS: utf8

api:
  endpoint: "http://localhost:8200/api/v1"
  auth_method: password
  doc_url: "https://docs.duplicati.com/developer/api"

default_port: 8200

systemd_service: duplicati

storage_backends:
  - local
  - s3
  - azure
  - b2
  - dropbox
  - google_drive
  - onedrive
  - sftp
  - ftp
  - webdav
  - openstack
  - rclone
