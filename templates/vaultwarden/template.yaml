# Vaultwarden Addon Template for NAVIG
# Bitwarden-compatible password manager

name: vaultwarden
version: "1.0.0"
description: "Self-hosted password manager compatible with Bitwarden clients"
author: navig-run
enabled: false
dependencies: []

paths:
  install_dir: /opt/vaultwarden
  data_dir: /var/lib/vaultwarden
  config_file: /etc/vaultwarden.env
  web_vault_dir: /opt/vaultwarden/web-vault
  log_file: /var/log/vaultwarden/vaultwarden.log
  backup_dir: /var/backups/vaultwarden

services:
  main: vaultwarden.service

commands:
  - name: start
    description: "Start Vaultwarden service"
    command: "systemctl start vaultwarden"
  - name: stop
    description: "Stop Vaultwarden service"
    command: "systemctl stop vaultwarden"
  - name: restart
    description: "Restart Vaultwarden service"
    command: "systemctl restart vaultwarden"
  - name: status
    description: "Check Vaultwarden status"
    command: "systemctl status vaultwarden"
  - name: logs
    description: "View Vaultwarden logs"
    command: "journalctl -u vaultwarden -f"
  - name: backup
    description: "Backup Vaultwarden database"
    command: "cp /var/lib/vaultwarden/db.sqlite3 /var/backups/vaultwarden/db-$(date +%Y%m%d).sqlite3"
  - name: update
    description: "Pull latest Docker image"
    command: "docker pull vaultwarden/server:latest"

env_vars:
  ROCKET_PORT: "8080"
  WEBSOCKET_ENABLED: "true"
  SIGNUPS_ALLOWED: "false"
  ADMIN_TOKEN: ""
  DATABASE_URL: "/var/lib/vaultwarden/db.sqlite3"
  LOG_FILE: "/var/log/vaultwarden/vaultwarden.log"
  DOMAIN: "https://vault.example.com"
  SMTP_HOST: ""
  SMTP_FROM: ""

api:
  endpoint: "http://localhost:8080/api"
  auth_method: bearer_token
  doc_url: "https://github.com/dani-garcia/vaultwarden/wiki"

default_port: 8080
websocket_port: 3012
systemd_service: /etc/systemd/system/vaultwarden.service

database:
  supported:
    - sqlite
    - postgresql
    - mysql
  default_type: sqlite
  default_db_path: /var/lib/vaultwarden/db.sqlite3
