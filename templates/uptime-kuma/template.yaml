# Uptime Kuma Template Configuration
# Self-hosted monitoring tool like Uptime Robot

name: uptime-kuma
version: 1.0.0
description: Self-hosted monitoring tool similar to Uptime Robot with status pages
author: navig-run
enabled: false
dependencies:
  - docker

paths:
  data_dir: /opt/uptime-kuma/data
  compose_file: /opt/uptime-kuma/docker-compose.yml
  database: /opt/uptime-kuma/data/kuma.db

services:
  uptime_kuma: uptime-kuma
  uptime_kuma_container: uptime-kuma

commands:
  - name: start
    description: Start Uptime Kuma container
    command: cd /opt/uptime-kuma && docker compose up -d

  - name: stop
    description: Stop Uptime Kuma container
    command: cd /opt/uptime-kuma && docker compose down

  - name: restart
    description: Restart Uptime Kuma container
    command: cd /opt/uptime-kuma && docker compose restart

  - name: status
    description: Check Uptime Kuma container status
    command: docker ps -f name=uptime-kuma

  - name: logs
    description: View Uptime Kuma logs
    command: docker logs -f uptime-kuma

  - name: update
    description: Update Uptime Kuma to latest version
    command: cd /opt/uptime-kuma && docker compose pull && docker compose up -d

  - name: backup
    description: Backup Uptime Kuma database
    command: cp /opt/uptime-kuma/data/kuma.db /backup/kuma-$(date +%Y%m%d).db

  - name: shell
    description: Access Uptime Kuma container shell
    command: docker exec -it uptime-kuma /bin/sh

env_vars:
  UPTIME_KUMA_PORT: "3001"
  NODE_ENV: production

api:
  endpoint: null
  auth_method: session
  doc_url: https://github.com/louislam/uptime-kuma/wiki

default_port: 3001
systemd_service: null
