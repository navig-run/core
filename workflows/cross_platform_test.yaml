name: cross_platform_test
description: Test cross-platform automation features
variables:
  test_text: "NAVIG Cross-Platform Test"
steps:
  # Test 1: Platform detection
  - action: run_command
    args:
      command: "echo Platform test running"
    capture: platform_check
  
  # Test 2: Wait (universal)
  - action: wait
    args:
      seconds: 0.5
  
  # Test 3: Clipboard (cross-platform)
  - action: set_clipboard
    args:
      text: "{{test_text}}"
    capture: clipboard_result
  
  # Test 4: Get clipboard back
  - action: get_clipboard
    capture: clipboard_content
  
  # Test 5: Get focused window
  - action: get_focused_window
    capture: current_window
  
  # Test 6: Conditional based on window
  - action: run_command
    args:
      command: "echo Window is focused"
    if: current_window != None
    capture: window_test_result
