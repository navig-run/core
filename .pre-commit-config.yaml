# Pre-commit hooks for NAVIG
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(assets/|.*\.snap$)'
      - id: end-of-file-fixer
        exclude: '^(assets/|.*\.snap$)'
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - '(\.venv|pnpm-lock\.yaml$|package-lock\.json$|\.backups/)'
          - --exclude-lines
          - 'api_key.*example'
          - --exclude-lines
          - 'password.*test'
          - --exclude-lines
          - 'sk-test-'

  # Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --extend-ignore=E203,E501,W503]

  # Shell script linting
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=error]
        exclude: '^(scripts/vendor/)'

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict, -d, '{extends: relaxed, rules: {line-length: {max: 200}}}']
        exclude: '^(pnpm-lock\.yaml)'

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--disable, MD013, MD033, MD041, --]
        exclude: '^(CHANGELOG\.md)'

  # TypeScript/JavaScript (for navig-bridge package)
  - repo: local
    hooks:
      - id: eslint-copilot
        name: ESLint (navig-bridge)
        entry: bash -c 'cd packages/navig-bridge && npm run lint --if-present || true'
        language: system
        files: '^packages/navig-bridge/.*\.(ts|tsx|js|jsx)$'
        pass_filenames: false

  # Local project checks
  - repo: local
    hooks:
      # Python type checking (optional - run if mypy available)
      - id: mypy
        name: mypy (type checking)
        entry: bash -c 'command -v mypy &>/dev/null && mypy navig --ignore-missing-imports || true'
        language: system
        files: '\.py$'
        pass_filenames: false
        require_serial: true

      # NAVIG security audit
      - id: navig-security
        name: NAVIG Security Check
        entry: |-
          python -c "
          try:
              from navig.core.security import run_security_audit, substitute_env_vars
              print('\u2705 Security module loaded successfully')
          except ImportError as e:
              print(f'\u26a0\ufe0f Security module not available: {e}')
          "
        language: system
        files: "\\.yaml$|\\.py$"
        pass_filenames: false
        verbose: true

# CI configuration
ci:
  autofix_prs: false
  autofix_commit_msg: '[pre-commit.ci] Auto-fix'
  autoupdate_commit_msg: '[pre-commit.ci] Auto-update pre-commit hooks'
  autoupdate_schedule: weekly
  skip: [mypy, navig-security, eslint-copilot]  # Skip local hooks in CI
