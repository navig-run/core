# Pre-commit hooks for NAVIG
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(assets/|.*\.snap$)'
      - id: end-of-file-fixer
        exclude: '^(assets/|.*\.snap$)'
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
        exclude: 'navig/core/security\.py'  # contains regex patterns for detecting keys, not actual keys

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - '(\.venv|pnpm-lock\.yaml$|package-lock\.json$|\.backups/)'
          - --exclude-lines
          - 'api_key.*example'
          - --exclude-lines
          - 'password.*test'
          - --exclude-lines
          - 'sk-test-'

  # Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=120
          - --extend-ignore=E203,E225,E228,E231,E301,E302,E402,E501,E711,E712,E722,E731,E741,F401,F402,F403,F541,F811,F821,F841,W503,W504

  # Shell script linting
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: bash -lc 'if command -v shellcheck >/dev/null 2>&1; then shellcheck --severity=error "$@"; else echo "shellcheck not installed; skipping"; fi' --
        language: system
        files: '\.sh$'
        exclude: '^(scripts/vendor/)'

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict, -d, '{extends: relaxed, rules: {line-length: {max: 200}, new-lines: disable}}']
        exclude: '^(pnpm-lock\.yaml)'

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args:
          - --disable
          - MD012  # multiple-blanks — content files use double blanks intentionally
          - MD013  # line-length — disabled globally
          - MD022  # blanks-around-headings — compact style in skill/help docs
          - MD024  # no-duplicate-heading — legitimate in skill files (Windows/Linux sections)
          - MD031  # blanks-around-fences — compact style in skill/help docs
          - MD032  # blanks-around-lists — compact style in skill/help docs
          - MD033  # no-inline-html — disabled globally
          - MD034  # no-bare-urls — intentional in skill/help docs
          - MD036  # no-emphasis-as-heading — intentional in SKILL.md examples
          - MD040  # fenced-code-language — not enforced on content files
          - MD041  # first-heading — disabled globally
          - --
        exclude: '^(CHANGELOG\.md|store/|navig/help/|navig/resources/|packages/.*\.md|navig/adapters/)'

  # TypeScript/JavaScript (for navig-bridge package)
  - repo: local
    hooks:
      - id: eslint-copilot
        name: ESLint (navig-bridge)
        entry: bash -c 'cd packages/navig-bridge && npm run lint --if-present || true'
        language: system
        files: '^packages/navig-bridge/.*\.(ts|tsx|js|jsx)$'
        pass_filenames: false

  # Local project checks
  - repo: local
    hooks:
      # Python type checking (optional - run if mypy available)
      - id: mypy
        name: mypy (type checking)
        entry: bash -c 'command -v mypy &>/dev/null && mypy navig --ignore-missing-imports || true'
        language: system
        files: '\.py$'
        pass_filenames: false
        require_serial: true

      # NAVIG security audit
      - id: navig-security
        name: NAVIG Security Check
        entry: bash scripts/precommit_navig_security.sh
        language: system
        files: "\\.yaml$|\\.py$"
        pass_filenames: false
        verbose: true

# CI configuration
ci:
  autofix_prs: false
  autofix_commit_msg: '[pre-commit.ci] Auto-fix'
  autoupdate_commit_msg: '[pre-commit.ci] Auto-update pre-commit hooks'
  autoupdate_schedule: weekly
  skip: [mypy, navig-security, eslint-copilot]  # Skip local hooks in CI
