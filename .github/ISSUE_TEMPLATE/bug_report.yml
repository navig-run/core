name: Bug report
description: Report a reproducible defect in NAVIG Core
title: "[BUG]: "
labels: [bug]
body:
  - type: textarea
    id: report
    attributes:
      label: Bug report
      description: |
        Scaffold généré par Nero. 
        Copiez-collez ici le contenu de `github_issue_draft.md`.
      value: |
        # Summary (What is broken ?)
        <!-- Describe the issue clearly -->

        ## Steps to reproduce
        ```bash
        # Commandes exécutées
        navig ...
        ```

        ## Version
        <!-- navig --version output -->

        ## Environment
        <!-- OS, Python, Shell info from system_report.json -->
    validations:
      required: true
