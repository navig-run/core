name: Documentation improvement
description: Request a docs fix or addition
title: "[Docs]: "
labels: [documentation]
body:
  - type: input
    id: location
    attributes:
      label: Doc location
      placeholder: "e.g. README.md or docs/user/quick-start.md"
  - type: textarea
    id: issue
    attributes:
      label: What is missing or unclear?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
