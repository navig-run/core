name: Documentation improvement
description: Request a docs fix or addition
title: "[DOCS]: "
labels: [documentation]
body:
  - type: textarea
    id: report
    attributes:
      label: Documentation report
      description: |
        Scaffold généré par Nero. 
        Copiez-collez ici le contenu de `github_issue_draft.md`.
      value: |
        # Summary (Documentation gap)
        <!-- What is missing or unclear? -->

        ## Doc location
        <!-- File path or URL -->

        ## Suggested improvement
        <!-- Corrected snippet or description -->

        ## Version
        <!-- navig --version -->

        ## Environment
        <!-- OS, Python, Shell -->
    validations:
      required: true
