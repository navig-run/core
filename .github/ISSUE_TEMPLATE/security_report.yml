name: Security report
description: Report a potential security issue (private process preferred)
title: "[Security]: "
labels: [security]
body:
  - type: markdown
    attributes:
      value: |
        > **Do not disclose exploit details publicly.**
        > Prefer private reporting via [SECURITY.md](https://github.com/navig-run/core/blob/main/SECURITY.md) channels.
  - type: textarea
    id: report
    attributes:
      label: Security report
      description: |
        Scaffold généré par Nero. 
        Copiez-collez ici le contenu de `github_issue_draft.md`.
      value: |
        # Summary (Security concern)
        <!-- High-level description. No exploit details. -->

        ## Version
        <!-- navig --version -->

        ## Environment
        <!-- OS, Python, Shell -->
    validations:
      required: true
