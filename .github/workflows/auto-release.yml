name: Auto-Release from Tag

# Triggers automatically when a versioned tag (v*) is pushed.
# Creates a GitHub Release with auto-generated release notes so that
# the publish.yml PyPI workflow fires immediately.
#
# Usage (future releases):
#   git tag -a v2.6.0 -m "Release v2.6.0"
#   git push origin v2.6.0
#   → This workflow creates the Release and triggers PyPI publish.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # rc / alpha / beta pre-releases

permissions:
  contents: write   # required to create the Release

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release-notes generation

      - name: Derive version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"                  # e.g. v2.5.0
          VERSION="${TAG#v}"                         # e.g. 2.5.0
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Detect pre-release: any tag containing a hyphen after the semver part
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(.+)$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # CHANGELOG.md is gitignored — curated notes are applied by
      # scripts/release.sh via 'gh release create' before this workflow runs.
      # This workflow only creates the release when it doesn't already exist
      # (e.g. a tag pushed directly without running release.sh).
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.meta.outputs.tag }} already exists — skipping creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release (auto-generated notes fallback)
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.meta.outputs.tag }}"
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.prerelease == 'false' }}
          generate_release_notes: true
