name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gitleaks scan
        run: docker run -v ${{ github.workspace }}:/path ghcr.io/gitleaks/gitleaks:latest detect --source="/path" -v

  test:
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Regenerate command registry
        run: python tools/export_registry.py --validate --format both --deprecations-report

      - name: Assert command registry is not stale
        run: |
          git diff --exit-code generated/commands.json || \
          (echo "commands.json is stale — run tools/export_registry.py" && exit 1)

      - name: Lint
        run: ruff check navig tests

      - name: Format check
        run: ruff format --check navig tests

      - name: Test
        run: >
          pytest
          --cov=navig.gateway.server
          --cov=navig.daemon.telegram_worker
          --cov=navig.daemon.service_manager
          --cov=navig.contracts
          --cov-report=term-missing
          --cov-fail-under=75

      - name: Guard — no test artifacts committed
        run: |
          if git ls-files | grep -Eq 'pytest_out.*\.txt|test_out.*\.txt|test_results.*\.txt'; then
            echo "ERROR: test artifact file(s) found in repository — remove and re-commit"
            git ls-files | grep -E 'pytest_out.*\.txt|test_out.*\.txt|test_results.*\.txt'
            exit 1
          fi

      - name: Guard — latest.json version matches pyproject.toml
        run: |
          PYPROJECT_VER=$(python -c "import re, pathlib; m=re.search(r'version = \"(\S+)\"', pathlib.Path('pyproject.toml').read_text()); print(m.group(1))")
          LATEST_VER=$(python -c "import json; print(json.load(open('latest.json'))['version'])")
          if [ "$PYPROJECT_VER" != "$LATEST_VER" ]; then
            echo "ERROR: version drift — pyproject.toml=$PYPROJECT_VER but latest.json=$LATEST_VER"
            echo "       Run: python scripts/_version_sync.py"
            exit 1
          fi
          echo "Version OK: $PYPROJECT_VER"

      - name: Build
        run: python -m build

  test-go:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libgtk-3-dev libappindicator3-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: host/go.mod
          cache-dependency-path: host/go.sum

      - name: Go vet
        working-directory: host
        run: go vet ./...

      - name: Go build
        working-directory: host
        run: go build ./...

      - name: Go test
        working-directory: host
        run: go test ./...
