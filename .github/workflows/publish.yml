name: Publish to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]

concurrency:
  group: pypi-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write  # required for trusted publishing (PyPI OIDC)

jobs:
  build:
    if: ${{ !github.event.release.prerelease && !github.event.release.draft && startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Validate tag matches pyproject version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path('pyproject.toml').read_text(encoding='utf-8')
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, flags=re.MULTILINE)
          if not match:
              raise SystemExit('Could not find project.version in pyproject.toml')
          print(match.group(1))
          PY
          )

          echo "Release tag version: ${TAG_VERSION}"
          echo "pyproject version: ${PYPROJECT_VERSION}"

          if [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "ERROR: Release tag (${TAG_VERSION}) does not match pyproject version (${PYPROJECT_VERSION})."
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Validate built distributions
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    if: ${{ !github.event.release.prerelease && !github.event.release.draft && startsWith(github.event.release.tag_name, 'v') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/navig
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  annotate-release:
    if: ${{ !github.event.release.prerelease && !github.event.release.draft && startsWith(github.event.release.tag_name, 'v') }}
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - name: Add PyPI link to release notes
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const tag = release.tag_name || '';
            const version = tag.startsWith('v') ? tag.slice(1) : tag;
            const pypiUrl = `https://pypi.org/project/navig/${version}/`;

            const marker = 'Published on PyPI:';
            const line = `${marker} ${pypiUrl}`;
            const body = release.body || '';

            if (body.includes(marker) || body.includes(pypiUrl)) {
              core.info('Release notes already include a PyPI link. Skipping update.');
              return;
            }

            const newBody = body.trim().length > 0 ? `${body}\n\n${line}` : line;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: newBody,
            });

            core.info(`Release notes updated with: ${pypiUrl}`);
