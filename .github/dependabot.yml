version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "cargo"
    directory: "/host/_rust_legacy"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "rust"
    ignore:
      - dependency-name: "glib"
        versions: [">=0.20.0"]
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
