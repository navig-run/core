name: "Basic Deployment Checklist"
description: "Pre-deployment verification steps for production releases"
author: "NAVIG Core Team"
type: checklist
version: "1.0.0"

steps:
  - description: "Run tests locally"
    command: "pytest tests/ -v"

  - description: "Check staging environment"
    notes: "Verify staging deployment succeeded and is healthy"

  - description: "Review changelog"
    notes: "Confirm all changes are documented in CHANGELOG.md"

  - description: "Backup production database"
    command: "navig db backup --verify"

  - description: "Deploy to production"
    notes: "Use CI/CD pipeline or manual deployment process"

  - description: "Verify health checks"
    command: "navig health"

  - description: "Monitor logs for 10 minutes"
    command: "navig logs --follow --lines 100"

  - description: "Notify team"
    notes: "Post deployment announcement in team chat"

notes: |
  This is a basic deployment checklist. Customize it for your workflow:
  - Add smoke tests specific to your application
  - Include security scans if required
  - Add rollback plan steps
  - Document stakeholder notifications
