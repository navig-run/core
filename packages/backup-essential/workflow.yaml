name: backup-essential
description: "Perform a quick backup of essential NAVIG config files."
version: "1.0.0"
type: runbook

steps:
  - name: list-config
    command: navig fs list /etc/navig
  - name: read-config
    command: navig fs read /etc/navig/config.yaml
  - name: check-git
    command: navig git status
