name: backup-essential
description: "Perform a quick backup of essential NAVIG config files."
version: "1.0.0"
type: runbook

steps:
  - name: list-config
    command: navig file list /etc/navig
  - name: read-config
    command: navig file show /etc/navig/config.yaml
  - name: check-git
    command: navig run "git status"
