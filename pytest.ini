[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --import-mode=importlib
    --basetemp=.pytest_tmp
markers =
    unit: Unit tests for individual functions
    integration: Integration tests requiring mocked dependencies
    slow: Tests that take longer to run
    requires_server: Tests that require actual server connection
asyncio_mode = auto
minversion = 3.10
